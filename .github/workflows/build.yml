name: Build wheels

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"
  pull_request:
  workflow_dispatch:
    inputs:
      repository_url:
        description: "PyPI repository URL to publish to"
        required: false
        default: "https://upload.pypi.org/legacy/"
        type: string

permissions:
  contents: read

env:
  PYPI_REPOSITORY_URL: ${{ inputs.repository_url || 'https://upload.pypi.org/legacy/' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Rust tests
        run: cargo test
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and test Python module
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin
          maturin develop --release
          python -c "import rs_xml2json; print('Python import OK')"

  linux:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, i686, aarch64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Setting version to $VERSION"
          sed -i.bak "0,/^version = \".*\"$/s//version = \"$VERSION\"/" Cargo.toml
          rm Cargo.toml.bak
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist

  macos:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: aarch64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Setting version to $VERSION"
          sed -i.bak "0,/^version = \".*\"$/s//version = \"$VERSION\"/" Cargo.toml
          rm Cargo.toml.bak
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  windows:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
          - target: i686-pc-windows-msvc
            arch: x86
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Setting version to $VERSION"
          sed -i.bak "0,/^version = \".*\"$/s//version = \"$VERSION\"/" Cargo.toml
          rm Cargo.toml.bak
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  sdist:
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Setting version to $VERSION"
          sed -i.bak "0,/^version = \".*\"$/s//version = \"$VERSION\"/" Cargo.toml
          rm Cargo.toml.bak
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, macos, windows, sdist]
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing --repository-url ${{ env.PYPI_REPOSITORY_URL }} dist/*
